<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 MBTI运势签 · 每日抽签</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e6f0fa 0%, #d4e4fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 32px 24px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.6);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #1e3a5f;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #2b4c7c;
            margin-bottom: 28px;
            font-style: italic;
        }
        /* MBTI选择器网格 */
        .mbti-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: white;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 8px 18px -8px #1e3a5f40;
            margin-bottom: 24px;
        }
        .mbti-btn {
            background: transparent;
            border: none;
            padding: 10px 4px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e3a5f;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .mbti-btn.active {
            background: #1e3a5f;
            color: white;
            box-shadow: 0 4px 10px #1e3a5f80;
        }
        .mbti-btn:hover {
            border-color: #1e3a5f;
        }
        /* 运势卡片 */
        .horoscope-box {
            background: white;
            border-radius: 32px;
            padding: 28px 22px;
            margin-bottom: 28px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02), 0 8px 20px #1e3a5f1a;
        }
        .today-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }
        .today-label h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e3a5f;
        }
        .date-badge {
            background: #d4e4fc;
            padding: 6px 16px;
            border-radius: 60px;
            color: #1e3a5f;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .stars {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 16px;
            margin: 20px 0;
        }
        .star-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .star-label {
            font-weight: 600;
            color: #2b4c7c;
            font-size: 1rem;
        }
        .star-bar-bg {
            background: #dbe6f5;
            height: 10px;
            border-radius: 30px;
            overflow: hidden;
        }
        .star-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f7eb3, #1e3a5f);
            border-radius: 30px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .advice {
            background: #eaf1fd;
            border-radius: 24px;
            padding: 18px 20px;
            margin-top: 16px;
            border-left: 6px solid #1e3a5f;
        }
        .advice p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #102a44;
        }
        /* 抽签区域 */
        .fortune-box {
            background: #fff2e6;
            border-radius: 28px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #ffd9b5;
            margin-bottom: 12px;
        }
        .fortune-left h3 {
            font-size: 1.4rem;
            color: #b45f2a;
            margin-bottom: 2px;
        }
        .fortune-left p {
            font-size: 1.3rem;
            font-weight: 600;
            color: #7b4a21;
        }
        .fortune-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .fortune-actions button {
            background: #f3b27a;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 8px 14px -6px #e09d60;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #ffdbb8;
            white-space: nowrap;
        }
        .fortune-actions button:active {
            transform: scale(0.96);
            background: #e69f60;
        }
        .fortune-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .draw-result {
            background: white;
            border-radius: 24px;
            padding: 16px 22px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #412f1e;
            box-shadow: 0 4px 12px #f0d8c0;
            margin: 16px 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .draw-text {
            flex: 1;
            min-width: 200px;
        }
        .copy-btn {
            background: #d4e4fc;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            color: #1e3a5f;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            border: 1px solid #a0bcdd;
        }
        .copy-btn:active {
            background: #b8cff0;
        }
        /* MBTI简易测试 */
        .test-section {
            background: #f8faff;
            border-radius: 32px;
            padding: 24px;
            margin-top: 30px;
            border: 1px solid #b0c8e0;
        }
        .test-title {
            font-size: 1.6rem;
            color: #1e3a5f;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .question {
            margin-bottom: 22px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #9bb6d0;
        }
        .question p {
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 10px;
        }
        .options {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #2b4c7c;
            cursor: pointer;
        }
        .test-result {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .test-result span {
            font-size: 1.4rem;
            font-weight: 600;
            background: #1e3a5f;
            color: white;
            padding: 8px 24px;
            border-radius: 60px;
        }
        .apply-btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 6px 14px #1e3a5f80;
            transition: 0.2s;
        }
        .apply-btn:active {
            transform: scale(0.96);
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            color: #2b4c7c;
            font-size: 0.9rem;
        }
        @media (max-width: 550px) {
            .mbti-grid { grid-template-columns: repeat(4, 1fr); }
            .stars { grid-template-columns: 1fr; }
            .fortune-actions { flex-direction: column; width: 100%; }
            .fortune-actions button { width: 100%; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧠 MBTI 运势签</h1>
    <div class="sub">每日性格运势 + 抽签 · 自用小站</div>

    <!-- MBTI 类型网格 -->
    <div class="mbti-grid" id="mbtiGrid"></div>

    <!-- 运势卡片 -->
    <div class="horoscope-box" id="horoscopeBox">
        <div class="today-label">
            <h2 id="mbtiName">ISTJ</h2>
            <span class="date-badge" id="todayDate"></span>
        </div>
        <div class="stars" id="starIndicators">
            <!-- 动态填充指数条 -->
        </div>
        <div class="advice" id="adviceText">
            <p>✨ 今日建议：保持开放心态，会有意外收获。</p>
        </div>
    </div>

    <!-- 抽签区域 -->
    <div class="fortune-box">
        <div class="fortune-left">
            <h3>🎋 运势抽签</h3>
            <p id="fortuneLabel">点击抽签</p>
        </div>
        <div class="fortune-actions">
            <button id="drawBtn">抽 签</button>
        </div>
    </div>
    <div class="draw-result" id="drawResult">
        <span class="draw-text" id="drawText">点一下签筒，看看今日手气～</span>
        <button class="copy-btn" id="copyBtn" style="display: none;">📋 复制签文</button>
    </div>

    <!-- 简易 MBTI 测试 -->
    <div class="test-section">
        <div class="test-title">🔍 简易MBTI测试</div>
        <div id="testQuestions">
            <!-- 四个问题 -->
            <div class="question" data-dim="EI">
                <p>① 你更喜欢？</p>
                <div class="options">
                    <label><input type="radio" name="q1" value="E"> 和朋友一起聚会 (E)</label>
                    <label><input type="radio" name="q1" value="I"> 独自安静读书 (I)</label>
                </div>
            </div>
            <div class="question" data-dim="SN">
                <p>② 你更注重？</p>
                <div class="options">
                    <label><input type="radio" name="q2" value="S"> 实际细节 (S)</label>
                    <label><input type="radio" name="q2" value="N"> 宏观概念 (N)</label>
                </div>
            </div>
            <div class="question" data-dim="TF">
                <p>③ 做决定时更依赖？</p>
                <div class="options">
                    <label><input type="radio" name="q3" value="T"> 逻辑分析 (T)</label>
                    <label><input type="radio" name="q3" value="F"> 情感价值 (F)</label>
                </div>
            </div>
            <div class="question" data-dim="JP">
                <p>④ 生活方式更倾向于？</p>
                <div class="options">
                    <label><input type="radio" name="q4" value="J"> 计划有序 (J)</label>
                    <label><input type="radio" name="q4" value="P"> 随性灵活 (P)</label>
                </div>
            </div>
        </div>
        <div class="test-result">
            <button id="calculateBtn" class="apply-btn">测 试</button>
            <span id="testResultType">----</span>
            <button id="applyTestResult" class="apply-btn" disabled>使用此类型</button>
        </div>
    </div>

    <div class="footer">✨ 每日更新 · 抽签每天一次 ✨</div>
</div>

<script>
    (function() {
        // ---------- MBTI 16型 ----------
        const MBTIS = [
            "ISTJ", "ISFJ", "INFJ", "INTJ",
            "ISTP", "ISFP", "INFP", "INTP",
            "ESTP", "ESFP", "ENFP", "ENTP",
            "ESTJ", "ESFJ", "ENFJ", "ENTJ"
        ];

        // ---------- 抽签库 ----------
        const FORTUNES = [
            { level: "大吉 🌕", text: "大吉大利，万事顺遂。今日宜主动出击，易得贵人相助。" },
            { level: "中吉 🌖", text: "中吉之兆，平稳中有惊喜。适合推进合作，小有收获。" },
            { level: "小吉 🌗", text: "小吉，略有波折但结局圆满。耐心可化解小麻烦。" },
            { level: "平 🌘", text: "无喜无忧，按部就班。宜静不宜动，多向内观。" },
            { level: "凶 🌑", text: "低调保守，避开冲突。如有重要决策，建议推迟一日。" }
        ];

        // 当前选中的MBTI索引 (默认0: ISTJ)
        let activeMbtiIndex = 0;

        // ---------- 工具函数：基于日期 + 索引生成确定性伪随机 (0~1) ----------
        function getDailySeed(index) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const base = year * 10000 + month * 100 + day;
            const seed = base * (index + 1) * 31;
            const a = 1664525;
            const c = 1013904223;
            const m = Math.pow(2, 32);
            let val = (seed * a + c) % m;
            return val / m;
        }

        // 根据种子获取范围内的整数
        function getDailyInt(seed, min, max) {
            return Math.floor(seed * (max - min + 1)) + min;
        }

        // 生成当日运势数据 (针对某个MBTI索引)
        function generateDailyHoroscope(index) {
            const seed = getDailySeed(index);
            const mbti = MBTIS[index];

            // 五个维度：综合、能量(E/I倾向)、信息(S/N)、决策(T/F)、生活(J/P) —— 为贴合MBTI调整
            const overall = getDailyInt(seed, 5, 10);
            const energy = getDailyInt(seed * 1.2, 4, 10);
            const info = getDailyInt(seed * 1.4, 4, 10);
            const decision = getDailyInt(seed * 1.6, 4, 10);
            const lifestyle = getDailyInt(seed * 1.8, 4, 10);

            // 建议文本，加入MBTI类型增加个性
            let advice = "";
            if (overall >= 9) advice = `作为 ${mbti}，今天你光芒四射！大胆展现自己，好事即将发生。`;
            else if (overall >= 8) advice = `✨ ${mbti} 状态在线，适合推进重要事项，但别忽略细节。`;
            else if (overall >= 7) advice = `🌿 ${mbti} 平稳顺遂，可趁势整理旧物或规划下一步。`;
            else if (overall >= 6) advice = `🌤️ ${mbti} 稍有起伏，保持耐心，傍晚后运势回升。`;
            else advice = `☔ ${mbti} 今日宜静不宜动，听听音乐，给自己一点空间。`;

            return {
                overall,
                energy: Math.min(10, Math.max(4, energy)),
                info: Math.min(10, Math.max(4, info)),
                decision: Math.min(10, Math.max(4, decision)),
                lifestyle: Math.min(10, Math.max(4, lifestyle)),
                advice
            };
        }

        // ---------- 渲染MBTI网格 ----------
        const gridDiv = document.getElementById('mbtiGrid');
        function renderMbtiGrid() {
            let html = '';
            MBTIS.forEach((name, idx) => {
                const activeClass = idx === activeMbtiIndex ? 'active' : '';
                html += `<button class="mbti-btn ${activeClass}" data-index="${idx}">${name}</button>`;
            });
            gridDiv.innerHTML = html;
            document.querySelectorAll('.mbti-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = parseInt(e.target.dataset.index, 10);
                    activeMbtiIndex = index;
                    document.querySelectorAll('.mbti-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    updateHoroscope(activeMbtiIndex);
                });
            });
        }

        // 更新运势卡片
        function updateHoroscope(index) {
            const mbti = MBTIS[index];
            document.getElementById('mbtiName').innerText = mbti;
            const data = generateDailyHoroscope(index);
            document.getElementById('starIndicators').innerHTML = `
                <div class="star-item"><span class="star-label">综合 ⭐ ${data.overall}</span><div class="star-bar-bg"><div class="star-bar-fill" style="width: ${data.overall * 10}%"></div></div></div>
                <div class="star-item"><span class="star-label">能量 🔋 ${data.energy}</span><div class="star-bar-bg"><div class="star-bar-fill" style="width: ${data.energy * 10}%"></div></div></div>
                <div class="star-item"><span class="star-label">信息 📘 ${data.info}</span><div class="star-bar-bg"><div class="star-bar-fill" style="width: ${data.info * 10}%"></div></div></div>
                <div class="star-item"><span class="star-label">决策 ⚖️ ${data.decision}</span><div class="star-bar-bg"><div class="star-bar-fill" style="width: ${data.decision * 10}%"></div></div></div>
                <div class="star-item"><span class="star-label">生活 🏡 ${data.lifestyle}</span><div class="star-bar-bg"><div class="star-bar-fill" style="width: ${data.lifestyle * 10}%"></div></div></div>
            `;
            document.getElementById('adviceText').innerHTML = `<p>✨ 今日建议：${data.advice}</p>`;
        }

        // 更新日期显示
        function setDate() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2,'0');
            const d = String(now.getDate()).padStart(2,'0');
            document.getElementById('todayDate').innerText = `${y}.${m}.${d}`;
        }

        // ---------- 抽签与 localStorage ----------
        const drawBtn = document.getElementById('drawBtn');
        const fortuneLabel = document.getElementById('fortuneLabel');
        const drawTextSpan = document.getElementById('drawText');
        const copyBtn = document.getElementById('copyBtn');
        const STORAGE_KEY = 'mbtiFortuneDraw';

        // 读取存储的抽签记录
        function loadDrawRecord() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) return null;
            try {
                return JSON.parse(stored);
            } catch {
                return null;
            }
        }

        // 保存抽签记录
        function saveDrawRecord(level, text) {
            const today = new Date().toDateString();
            const record = {
                date: today,
                fortune: { level, text }
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(record));
            return record;
        }

        // 检查今日是否已抽签，并更新UI
        function checkTodayDraw() {
            const record = loadDrawRecord();
            const today = new Date().toDateString();
            if (record && record.date === today) {
                // 今日已抽，禁用按钮，显示结果
                drawBtn.disabled = true;
                fortuneLabel.innerText = record.fortune.level;
                drawTextSpan.innerText = `🔮 ${record.fortune.text}`;
                copyBtn.style.display = 'inline-block';
                return true;
            } else {
                drawBtn.disabled = false;
                fortuneLabel.innerText = '点击抽签';
                drawTextSpan.innerText = '点一下签筒，看看今日手气～';
                copyBtn.style.display = 'none';
                return false;
            }
        }

        // 抽签
        function drawFortune() {
            if (drawBtn.disabled) return; // 已抽过
            const randomIndex = Math.floor(Math.random() * FORTUNES.length);
            const picked = FORTUNES[randomIndex];
            fortuneLabel.innerText = picked.level;
            drawTextSpan.innerText = `🔮 ${picked.text}`;
            copyBtn.style.display = 'inline-block';
            // 存储记录
            saveDrawRecord(picked.level, picked.text);
            drawBtn.disabled = true;

            // 小动画
            drawTextSpan.parentElement.style.transform = 'scale(1.02)';
            setTimeout(() => drawTextSpan.parentElement.style.transform = 'scale(1)', 100);
        }

        // 复制文本
        async function copyFortune() {
            const text = drawTextSpan.innerText.replace('🔮 ', ''); // 去掉emoji可选
            try {
                await navigator.clipboard.writeText(`今日运势抽签：${fortuneLabel.innerText} ${text}`);
                alert('✅ 签文已复制到剪贴板');
            } catch {
                alert('❌ 复制失败，请手动复制');
            }
        }

        // ---------- 简易MBTI测试 ----------
        const calculateBtn = document.getElementById('calculateBtn');
        const testResultSpan = document.getElementById('testResultType');
        const applyTestBtn = document.getElementById('applyTestResult');

        function calculateMBTI() {
            const q1 = document.querySelector('input[name="q1"]:checked');
            const q2 = document.querySelector('input[name="q2"]:checked');
            const q3 = document.querySelector('input[name="q3"]:checked');
            const q4 = document.querySelector('input[name="q4"]:checked');
            if (!q1 || !q2 || !q3 || !q4) {
                alert('请回答所有问题');
                return null;
            }
            const type = q1.value + q2.value + q3.value + q4.value;
            // 验证是否为有效MBTI (理论上所有组合都是有效的)
            if (MBTIS.includes(type)) {
                return type;
            } else {
                // 极少数组合如 "INTJ" 合法，但所有组合都是MBTI，所以一般不会走到这里
                return type;
            }
        }

        calculateBtn.addEventListener('click', () => {
            const result = calculateMBTI();
            if (result) {
                testResultSpan.innerText = result;
                applyTestBtn.disabled = false;
            }
        });

        applyTestBtn.addEventListener('click', () => {
            const type = testResultSpan.innerText;
            const index = MBTIS.indexOf(type);
            if (index !== -1) {
                activeMbtiIndex = index;
                // 更新网格高亮
                document.querySelectorAll('.mbti-btn').forEach((btn, i) => {
                    if (i === index) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                updateHoroscope(index);
            } else {
                alert('类型无效');
            }
        });

        // ---------- 初始化 ----------
        setDate();
        renderMbtiGrid();
        updateHoroscope(activeMbtiIndex);
        checkTodayDraw();

        // 事件绑定
        drawBtn.addEventListener('click', drawFortune);
        copyBtn.addEventListener('click', copyFortune);
    })();
</script>
</body>
</html>
